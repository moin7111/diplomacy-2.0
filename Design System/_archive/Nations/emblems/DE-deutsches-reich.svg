<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <defs>
    <linearGradient id="de-shield-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#666666"/>
      <stop offset="100%" stop-color="#2A2A2A"/>
    </linearGradient>
    <linearGradient id="de-gold-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDD898"/>
      <stop offset="50%" stop-color="#C5A55A"/>
      <stop offset="100%" stop-color="#9E7E3A"/>
    </linearGradient>
    <filter id="de-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>

  <!-- Shield outline (gold border) -->
  <path d="M60 8 L108 8 L108 85 Q108 118 60 132 Q12 118 12 85 L12 8 Z"
        fill="url(#de-gold-grad)" filter="url(#de-shadow)"/>

  <!-- Shield fill -->
  <path d="M60 13 L104 13 L104 84 Q104 114 60 127 Q16 114 16 84 L16 13 Z"
        fill="url(#de-shield-grad)"/>

  <!-- Imperial Eagle body -->
  <ellipse cx="60" cy="78" rx="15" ry="18" fill="#C5A55A"/>

  <!-- Eagle breast feathers detail -->
  <path d="M50 70 Q55 75 60 72 Q65 75 70 70" stroke="#9E7E3A" stroke-width="1" fill="none"/>
  <path d="M48 78 Q54 83 60 80 Q66 83 72 78" stroke="#9E7E3A" stroke-width="1" fill="none"/>
  <path d="M50 86 Q55 90 60 88 Q65 90 70 86" stroke="#9E7E3A" stroke-width="1" fill="none"/>

  <!-- Eagle left wing -->
  <path d="M45 72 Q25 60 20 40 Q22 35 26 38 Q30 50 38 58 Q30 45 35 35 Q39 32 42 36 Q40 48 46 56 Q42 43 48 37 Q52 35 54 40 Q50 52 52 62 Z"
        fill="#C5A55A"/>
  <!-- Wing feather details -->
  <path d="M20 40 Q30 50 38 58" stroke="#9E7E3A" stroke-width="1" fill="none" opacity="0.7"/>
  <path d="M35 35 Q42 48 46 56" stroke="#9E7E3A" stroke-width="1" fill="none" opacity="0.7"/>
  <path d="M48 37 Q50 52 52 62" stroke="#9E7E3A" stroke-width="1" fill="none" opacity="0.7"/>

  <!-- Eagle right wing -->
  <path d="M75 72 Q95 60 100 40 Q98 35 94 38 Q90 50 82 58 Q90 45 85 35 Q81 32 78 36 Q80 48 74 56 Q78 43 72 37 Q68 35 66 40 Q70 52 68 62 Z"
        fill="#C5A55A"/>
  <!-- Wing feather details -->
  <path d="M100 40 Q90 50 82 58" stroke="#9E7E3A" stroke-width="1" fill="none" opacity="0.7"/>
  <path d="M85 35 Q78 48 74 56" stroke="#9E7E3A" stroke-width="1" fill="none" opacity="0.7"/>
  <path d="M72 37 Q70 52 68 62" stroke="#9E7E3A" stroke-width="1" fill="none" opacity="0.7"/>

  <!-- Eagle head -->
  <circle cx="60" cy="52" r="11" fill="#C5A55A"/>

  <!-- Eagle beak (hooked, facing right) -->
  <path d="M68 52 L76 50 L74 54 L68 54 Z" fill="#9E7E3A"/>
  <path d="M74 54 L78 56 L74 57 Z" fill="#9E7E3A"/>

  <!-- Eagle eye -->
  <circle cx="64" cy="50" r="3" fill="#111C27"/>
  <circle cx="64" cy="50" r="1.5" fill="#EDD898"/>
  <circle cx="63.5" cy="49.5" r="0.7" fill="#111C27"/>

  <!-- Imperial Crown -->
  <path d="M50 40 L50 34 L54 37 L57 30 L60 37 L63 30 L66 37 L70 34 L70 40 Z"
        fill="url(#de-gold-grad)"/>
  <rect x="48" y="38" width="24" height="5" rx="1" fill="url(#de-gold-grad)"/>
  <!-- Crown gems -->
  <circle cx="54" cy="35" r="2" fill="#CC0000"/>
  <circle cx="60" cy="32" r="2" fill="#3498DB"/>
  <circle cx="66" cy="35" r="2" fill="#CC0000"/>

  <!-- Eagle talons -->
  <path d="M50 95 Q46 100 44 106 M47 92 Q42 97 40 103 M54 96 Q52 103 51 109"
        stroke="#9E7E3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M70 95 Q74 100 76 106 M73 92 Q78 97 80 103 M66 96 Q68 103 69 109"
        stroke="#9E7E3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Shield border inner line -->
  <path d="M60 16 L101 16 L101 84 Q101 112 60 124 Q19 112 19 84 L19 16 Z"
        fill="none" stroke="#C5A55A" stroke-width="1.5" opacity="0.6"/>
</svg>
