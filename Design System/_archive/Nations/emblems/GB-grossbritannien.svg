<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <defs>
    <linearGradient id="gb-shield-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0B8C6"/>
      <stop offset="100%" stop-color="#C47090"/>
    </linearGradient>
    <linearGradient id="gb-gold-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDD898"/>
      <stop offset="50%" stop-color="#C5A55A"/>
      <stop offset="100%" stop-color="#9E7E3A"/>
    </linearGradient>
    <filter id="gb-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
  </defs>

  <!-- Shield outline (gold border) -->
  <path d="M60 8 L108 8 L108 85 Q108 118 60 132 Q12 118 12 85 L12 8 Z"
        fill="url(#gb-gold-grad)" filter="url(#gb-shadow)"/>

  <!-- Shield fill -->
  <path d="M60 13 L104 13 L104 84 Q104 114 60 127 Q16 114 16 84 L16 13 Z"
        fill="url(#gb-shield-grad)"/>

  <!-- Heraldic Lion (simplified, rampant) -->
  <!-- Body -->
  <ellipse cx="60" cy="72" rx="18" ry="22" fill="#8B0000" opacity="0.85"/>
  <!-- Head -->
  <circle cx="72" cy="52" r="12" fill="#8B0000" opacity="0.85"/>
  <!-- Mane -->
  <circle cx="72" cy="52" r="15" fill="#6B0000" opacity="0.6"/>
  <circle cx="72" cy="52" r="12" fill="#8B0000" opacity="0.85"/>
  <!-- Face features -->
  <circle cx="69" cy="50" r="2" fill="#F4E8C1"/>
  <circle cx="76" cy="50" r="2" fill="#F4E8C1"/>
  <circle cx="69.5" cy="50.5" r="1" fill="#111C27"/>
  <circle cx="76.5" cy="50.5" r="1" fill="#111C27"/>
  <!-- Nose -->
  <ellipse cx="73" cy="54" rx="3" ry="2" fill="#6B0000"/>
  <!-- Mouth -->
  <path d="M69 57 Q73 60 77 57" stroke="#F4E8C1" stroke-width="1" fill="none"/>
  <!-- Crown on lion -->
  <rect x="66" y="38" width="13" height="5" fill="#C5A55A" rx="1"/>
  <rect x="64" y="35" width="3" height="6" fill="#C5A55A" rx="1"/>
  <rect x="70" y="33" width="3" height="8" fill="#C5A55A" rx="1"/>
  <rect x="76" y="35" width="3" height="6" fill="#C5A55A" rx="1"/>
  <!-- Crown gems -->
  <circle cx="65.5" cy="35" r="1.5" fill="#E8A0B0"/>
  <circle cx="71.5" cy="33" r="1.5" fill="#CC0000"/>
  <circle cx="77.5" cy="35" r="1.5" fill="#E8A0B0"/>

  <!-- Front paw raised -->
  <ellipse cx="83" cy="62" rx="7" ry="5" fill="#8B0000" opacity="0.85" transform="rotate(-30 83 62)"/>
  <path d="M86 57 L90 52 M88 59 L93 55" stroke="#8B0000" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Tail -->
  <path d="M42 70 Q35 55 40 45 Q45 38 50 42" stroke="#8B0000" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M50 42 Q55 38 53 33 Q51 28 56 26" stroke="#8B0000" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Hind legs -->
  <ellipse cx="52" cy="90" rx="8" ry="5" fill="#8B0000" opacity="0.85" transform="rotate(20 52 90)"/>
  <ellipse cx="68" cy="93" rx="8" ry="5" fill="#8B0000" opacity="0.85" transform="rotate(-15 68 93)"/>

  <!-- Three dots (passant) decoration -->
  <circle cx="38" cy="35" r="3" fill="#C5A55A"/>
  <circle cx="38" cy="68" r="3" fill="#C5A55A"/>
  <circle cx="38" cy="101" r="3" fill="#C5A55A"/>

  <!-- Shield border inner line -->
  <path d="M60 16 L101 16 L101 84 Q101 112 60 124 Q19 112 19 84 L19 16 Z"
        fill="none" stroke="#C5A55A" stroke-width="1.5" opacity="0.6"/>

  <!-- Nation label -->
  <rect x="10" y="134" width="100" height="0" fill="none"/>
</svg>
